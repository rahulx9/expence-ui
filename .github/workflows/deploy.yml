name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Create .env
        run: |
          echo "VITE_APP_TITLE=${{ vars.VITE_APP_TITLE }}" > .env
          echo "VITE_API_URL=${{ vars.VITE_API_URL }}" >> .env

      - name: Verify .env
        run: cat .env

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Add SPA 404 fallback
        run: |
          cp ./dist/index.html ./dist/404.html

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4